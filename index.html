<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="style.css"rel="stylesheet">
  <title>EasyDorm</title>
</head>
<body>


<div id="loader" class="loader-overlay">
    <div class="spinner"></div>
    <p>Loading Recipes ...</p>
</div> 
    <div class="page">
        <div class="header">
            <h1>EasyDorm</h1>
            <p>Simple, affordable, and dorm-friendly meals for students.</p>
        </div>

    <div class="categories">
        <div class="card">
        <a href="category1.html">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTXdLsi3jjHuwk4h4YHrcU3eX6YO9CFX7xIOwDWZ_YKzYevhGGX1vWp09Y&s=10" alt="Cold Foods Category">
            <p>Freezer</p></a>
            <br>
        </div>

        <div class="card">
            <a href=category2.html><img src="https://images.immediate.co.uk/production/volatile/sites/30/2022/08/Garam-masala-vegetable-curry-15845cb.jpg" alt="Microwave Category">
            <p>Fridge</p></a>
            <br>
        </div>

        <div class="card">
            <a href=category3.html><img src="https://www.southernliving.com/thmb/7pIGBWeSZ8xIxBi5CJKc9w-8mkQ=/1500x0/filters:no_upscale():max_bytes(150000):strip_icc()/SL-27810_OE_Brambleberry-Smoothies-3621-142c15c0b2d54427b84354e43ba14602.jpg" alt="Blender Category">
            <p>Blender</p></a>
            <br>
        </div>

        <div class="card">
            <a href=category4.html><img src="https://instacuppastore.com/cdn/shop/articles/kettle-recipes-hostel.jpg?v=1776863600&width=1100" alt="Kettle Category">
            <p>Kettle and Microwave</p></a>
            <br>
        </div>
    </div>

    <div class="about">
        <h2>About</h2>
        <p>EasyDorm is a website that helps boarding students cook easy, affordable, and dorm friendly meals in a limited amount of time. <p>
    </div>
</div>
    <script>
        const loader = document.getElementById("loader");
        const categoryLink = document.querySelectorAll(".categories .card a")
        categoryLink.forEach(link=>{
            link.addEventListener("click", function(event){
                event.preventDefault();
                const targetUrl = this.getAttribute("href");

                loader.classList.add("active");
                setTimeout(() =>{
                    window.location.href = targetUrl;
                }, 600);
            });
        });
    </script>

</body>
</html>
