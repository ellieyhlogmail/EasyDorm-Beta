<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="style.css" rel="stylesheet">
  <title>Recipe</title>
</head>
<body>
  <div class="page" id="recipe-container">
    <div class="breadcrumb">
      <a href="index.html">Home</a>
      <span>&gt;</span>
      <a href="#" id="category-link">Category</a>
    </div>

    <div class="recipe-layout">
      <div class="recipe-title-box">
        <h1 id="recipe-title">Recipe Title</h1>
      </div>

      <div class="recipe-main-pic-box">
        <img id="main-image" src="" alt="Recipe Image">
      </div>

      <div class="recipe-extra-info-box">
        <h3>Information</h3>
        <p><strong>Time</strong>: <span id="recipe-time"></span></p>
        <p><strong>Tool/tools</strong>: <span id="recipe-tools"></span></p>
        <p><strong>Budget</strong>: <span id="recipe-budget"></span></p>
        <p><strong>Difficulty Level</strong>: <span id="recipe-difficulty"></span></p>
      </div>

      <div class="recipe-ingredients-box">
        <h4>Ingredients</h4>
        <ul id="ingredients"></ul>
      </div>

      <div class="recipe-media-box">
        <h2>Pics/Vids</h2>
        <img id="prep-image" src="" alt="Preparation Image">
        <br>
        <a id="video-link" href="#" target="_blank">Watch the video tutorial</a>
      </div>

      <div class="recipe-box">
        <h2>Step-by-Step Instructions</h2>
        <ol id="recipe-steps"></ol>
      </div>      
    </div>
  </div>

  <script src="recipes.js"></script>
</body>
</html>
